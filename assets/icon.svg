<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="title desc">
  <title id="title">RankRepair AI icon</title>
  <desc id="desc">A large white letter R on a blue background.</desc>
  <defs>
    <linearGradient id="background" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#background)"/>
  <text x="128" y="181" text-anchor="middle" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="154" font-weight="800" letter-spacing="0" fill="#ffffff" filter="url(#letterShadow)">R</text>
</svg>
